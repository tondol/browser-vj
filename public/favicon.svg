<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262633"/>
      <stop offset="1" stop-color="#14141a"/>
    </linearGradient>
    <radialGradient id="deckA" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#b3c0ff"/>
      <stop offset="0.5" stop-color="#5b6cff"/>
      <stop offset="1" stop-color="#23275e"/>
    </radialGradient>
    <radialGradient id="deckB" cx="0.42" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#ffb0de"/>
      <stop offset="0.5" stop-color="#ff4fa3"/>
      <stop offset="1" stop-color="#5e2342"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- 2つのデッキ。小サイズでも分離して見えるよう少し離す -->
  <g>
    <circle cx="22" cy="29" r="15" fill="url(#deckA)"/>
    <circle cx="22" cy="29" r="4" fill="#14141a"/>
  </g>
  <g>
    <circle cx="42" cy="29" r="15" fill="url(#deckB)"/>
    <circle cx="42" cy="29" r="4" fill="#14141a"/>
  </g>

  <!-- クロスフェーダー -->
  <rect x="13" y="52" width="38" height="4" rx="2" fill="#3d3d57"/>
  <rect x="28" y="49" width="8" height="10" rx="2.5" fill="#f0f0f7"/>
</svg>
