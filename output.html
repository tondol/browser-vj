<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>browser-vj output</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      .stage {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .stage video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .hint {
        position: absolute;
        bottom: 8px;
        right: 12px;
        color: #888;
        font: 12px sans-serif;
        opacity: 0.7;
        pointer-events: none;
        transition: opacity 1s;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <video id="video-a" muted playsinline loop></video>
      <video id="video-b" muted playsinline loop></video>
      <span class="hint" id="hint">ダブルクリックでフルスクリーン</span>
    </div>
    <script type="module" src="/src/output.ts"></script>
  </body>
</html>
