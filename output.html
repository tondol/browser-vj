<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>browser-vj output</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      .stage {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .stage video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        /* object-fit:contain のレターボックス部は透明なので、アスペクト比が
           異なると上の deck の黒帯から下の deck が透けて見えてしまう。
           背景を黒で塗り、表示側の帯部分が下を隠すようにする。 */
        background: #000;
      }
      .hint {
        position: absolute;
        bottom: 8px;
        right: 12px;
        color: #888;
        font: 12px sans-serif;
        opacity: 0.7;
        pointer-events: none;
        transition: opacity 1s;
      }
      body.maximized {
        cursor: none;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <video id="video-a" muted playsinline loop></video>
      <video id="video-b" muted playsinline loop></video>
      <span class="hint" id="hint">ダブルクリックで最大化</span>
    </div>
    <script type="module" src="/src/output.ts"></script>
  </body>
</html>
